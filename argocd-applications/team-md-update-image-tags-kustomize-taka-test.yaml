apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: team-md-update-image-tags-kustomize-taka-development
  annotations:
    argo.octopus.com/project: "update-image-tags-kustomize-taka"
    argo.octopus.com/environment: "development"
spec:
  project: default
  source:
    repoURL: https://github.com/BobJWalker/TAKA.git
    targetRevision: HEAD
    path: k8s/
  destination:
    server: https://kubernetes.default.svc
    namespace: team-md-update-image-tags-kustomize-taka-development
  syncPolicy:
    automated:  
      prune: true
      selfHeal: true
    syncOptions:
    - Validate=false
    - CreateNamespace=true